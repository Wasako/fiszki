<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#121212" />
  <title>Fizyka — fiszki i zadania</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fizki" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="css/styles.css" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    crossorigin="anonymous"
  />
  <script>
    (function () {
      var t = localStorage.getItem("fizki_theme") || "dark";
      document.documentElement.dataset.theme = t;
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute("content", t === "light" ? "#f4f4f9" : "#121212");
    })();
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="app-brand">
      <a class="app-brand-link" href="/" aria-label="Fizki — strona główna">
        <img class="app-logo app-logo--theme-dark" src="/logo/fizki_yellow.svg" alt="" width="120" height="49" decoding="async" fetchpriority="high" />
        <img class="app-logo app-logo--theme-light" src="/logo/fizki_black.svg" alt="" width="120" height="49" decoding="async" fetchpriority="high" />
      </a>
      <button type="button" id="app-mini-breadcrumb" class="app-mini-breadcrumb" hidden aria-label="Zmień szkołę i klasę"></button>
    </header>
    <!-- #app: cały UI generuje js/app.js -->
    <div id="app" class="app"></div>
  </div>
  <footer class="app-footer">
    <p id="pwa-install-hint" class="pwa-install-hint" hidden></p>
    <div class="app-footer-actions">
      <button type="button" id="pwa-install" class="btn-theme-toggle btn-pwa-install" hidden>📲 Zainstaluj aplikację</button>
      <button type="button" id="theme-toggle" class="btn-theme-toggle" aria-label="Przełącz motyw jasny lub ciemny">🌓 Zmień motyw</button>
    </div>
  </footer>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="js/wzory-symbol-legends.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
