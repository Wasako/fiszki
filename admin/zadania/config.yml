# Decap CMS — tylko zadania.json (edytorzy z ograniczonym dostępem)
# Panel: https://fizki.pl/admin/zadania/
# Pełny panel (fiszki + zadania): https://fizki.pl/admin/
# Polityka / wyłączenie strażnika: config/cms-access.json

backend:
  name: github
  repo: Wasako/fiszki
  branch: master
  base_url: https://fizki.pl
  auth_endpoint: api/auth?return=/admin/zadania/

site_url: https://fizki.pl
display_url: https://fizki.pl
logo:
  url: https://fizki.pl
  text: Fizki — zadania

collections:
  - name: zadania
    label: Zadania główne
    files:
      - name: baza_zadan
        label: Baza zadań (zadania.json)
        file: zadania.json
        format: json
        fields:
          - label: Poziomy edukacji
            name: levels
            widget: list
            summary: "{{fields.id}} — {{fields.title}}"
            fields:
              - label: ID poziomu
                name: id
                widget: string
                hint: "np. lo-rozszerzenie, lo-podstawa, sp"
              - label: Tytuł poziomu
                name: title
                widget: string
              - label: Działy (sections)
                name: sections
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - label: ID działu
                    name: id
                    widget: string
                  - label: Tytuł działu
                    name: title
                    widget: string
                  - label: Zadania
                    name: tasks
                    widget: list
                    summary: "{{fields.title}}"
                    fields:
                      - label: Tytuł zadania
                        name: title
                        widget: string
                      - label: Poziom trudności (1-3)
                        name: difficulty
                        widget: select
                        options: ["1", "2", "3"]
                        default: "1"
                        required: false
                      - label: Typ odpowiedzi
                        name: taskType
                        widget: select
                        options:
                          - { label: Otwarte (pokaż rozwiązanie), value: open }
                          - { label: ABCD, value: abcd }
                          - { label: Wynik liczbowy (math), value: math }
                        default: open
                        required: false
                      - label: Dokładny wynik (dla typu math)
                        name: mathValue
                        widget: string
                        required: false
                        hint: "Kropka lub przecinek, np. 49.05"
                      - label: Jednostka (np. m/s^2)
                        name: mathUnit
                        widget: string
                        required: false
                      - label: Opcje ABCD
                        name: abcdOptions
                        widget: list
                        required: false
                        min: 0
                        max: 4
                        fields:
                          - label: Treść opcji
                            name: text
                            widget: string
                          - label: Poprawna odpowiedź
                            name: isCorrect
                            widget: boolean
                            default: false
                      - label: Pytanie (treść, Markdown + $LaTeX$)
                        name: question
                        widget: text
                        required: false
                      - label: Odpowiedź (skrót)
                        name: answer
                        widget: text
                        required: false
                      - label: Quiz wzorów — bramka (formulaQuiz)
                        name: formulaQuiz
                        widget: object
                        collapsed: true
                        required: false
                        hint: "Opcjonalnie. Bramka w aplikacji działa dopiero gdy są 4 wypełnione opcje (katex). Puste quizy — zostaw zwinięte lub usuń cały blok."
                        fields:
                          - label: Symbol LHS (lhsLatex)
                            name: lhsLatex
                            widget: string
                            required: false
                          - label: Treść pytania quizu (prompt)
                            name: prompt
                            widget: text
                            required: false
                          - label: Opcje quizu (choices) — dodaj 4, aby włączyć bramkę
                            name: choices
                            widget: list
                            min: 0
                            max: 4
                            required: false
                            fields:
                              - label: Wzór KaTeX (katex)
                                name: katex
                                widget: text
                                required: false
                              - label: Poprawna odpowiedź
                                name: correct
                                widget: boolean
                                default: false
                                required: false
                              - label: Uzasadnienie (distractorRationale)
                                name: distractorRationale
                                widget: text
                                required: false
                                hint: Wyświetlane po wyborze błędnej opcji.
                      - label: Wzory pomocnicze (formulas — tablica stringów)
                        name: formulas
                        widget: list
                        required: false
                        field:
                          label: Wzór LaTeX
                          name: latex
                          widget: string
                      - label: Kroki rozwiązania (solutionSteps — tablica stringów)
                        name: solutionSteps
                        widget: list
                        required: false
                        field:
                          label: Krok (Markdown + $LaTeX$)
                          name: step
                          widget: text
