# Strażnik ścieżek dla edytorów CMS — włącz/wyłącz w config/cms-access.json (enabled: true|false)
name: CMS limited editor guard

on:
  push:
    branches: [master, main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sprawdź politykę (config/cms-access.json)
        run: node scripts/check-cms-limited-push.mjs
