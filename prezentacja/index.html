<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizki — Prezentacja Platformy</title>
    <!-- Favicon, opcjonalnie podepnij ten sam co w głównej apce -->
    <meta name="theme-color" content="#121212">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e24;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent-fizki: #ffc700;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: var(--bg-card);
        }

        .header h1 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 span {
            color: var(--accent-fizki);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsywny kontener YouTube (16:9) */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .description {
            margin-top: 32px;
            line-height: 1.6;
            color: var(--text-muted);
            text-align: center;
            max-width: 600px;
        }

        .description h2 {
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 1.4rem;
        }

        .btn-primary {
            display: inline-block;
            margin-top: 32px;
            padding: 14px 28px;
            background: var(--accent-fizki);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255, 199, 0, 0.3);
        }
    </style>
</head>
<body>

    <header class="header">
        <h1><span>⚡</span> Fizki</h1>
    </header>

    <main class="container">
        <!-- Odtwarzacz Wideo — podmień ID_TWOJEGO_FILMU na ID z YouTube -->
        <div class="video-wrapper">
            <iframe
                src="https://www.youtube.com/embed/Zw-WqlUKvu4?rel=0"
                title="Fizki - Prezentacja"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Opis pod filmem -->
        <div class="description">
            <h2>Pitch Wideo</h2>
            <p>Zobacz, jak nasza platforma łączy microlearning przyjazny neuroatypowym z zaawansowanym systemem B2B dla szkół i korepetytorów.</p>
        </div>

        <!-- Call to Action -->
        <a href="/" class="btn-primary">Przetestuj wersję Demo</a>
    </main>

</body>
</html>
